<script>
// ===================== FIREBASE REAL‑TIME BACKEND =====================
// All data is stored centrally – every device sees the same.

const FB_URL_KEY = 'isra_fb_url';
const FB_SEC_KEY = 'isra_fb_secret';

function getFirebaseUrl()    { return localStorage.getItem(FB_URL_KEY) || ''; }
function getFirebaseSecret() { return localStorage.getItem(FB_SEC_KEY) || ''; }
function setFirebaseConfig(url, secret) {
  if (url) localStorage.setItem(FB_URL_KEY, url);
  if (secret) localStorage.setItem(FB_SEC_KEY, secret);
}

// Fireabase REST API helpers (with secret auth)
async function fbGet(path) {
  const url = getFirebaseUrl();
  if (!url) return null;
  try {
    const res = await fetch(`${url}/${path}.json`);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { console.warn('fbGet error', path, e); return null; }
}

async function fbSet(path, data) {
  const url = getFirebaseUrl();
  const secret = getFirebaseSecret();
  if (!url || !secret) return false;
  try {
    const res = await fetch(`${url}/${path}.json?auth=${secret}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return res.ok;
  } catch(e) { console.warn('fbSet error', path, e); return false; }
}

async function fbPush(path, data) {
  const url = getFirebaseUrl();
  const secret = getFirebaseSecret();
  if (!url || !secret) return false;
  try {
    const res = await fetch(`${url}/${path}.json?auth=${secret}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return res.ok;
  } catch(e) { return false; }
}

// ------------- Settings (admin secret, category passwords, duration, AI key) -------------
let _settingsCache = {};

async function loadSettings() {
  const data = await fbGet('settings');
  if (data && typeof data === 'object') {
    _settingsCache = data;
    // apply locally
    if (data.duration) localStorage.setItem('isra_dur', data.duration);
    return _settingsCache;
  }
  // Fallback to localStorage for offline mode
  _settingsCache = {
    adminHash: localStorage.getItem('isra_admin_hash') || '',
    duration: localStorage.getItem('isra_dur') || '60',
    aiKey: localStorage.getItem('isra_ai_key') || ''
  };
  // load category passwords from separate keys
  const cats = ['sindhi_hyd','math_hyd','english_hyd','math_mirpur','sst_mirpur','montessori_mirpur'];
  cats.forEach(c => {
    _settingsCache[`pw_${c}`] = localStorage.getItem(`pw_${c}`) || 'isra123';
  });
  return _settingsCache;
}

async function saveSettings(updates) {
  // merge with current
  const current = await loadSettings();
  const merged = { ...current, ...updates };
  const ok = await fbSet('settings', merged);
  if (ok) {
    _settingsCache = merged;
    // sync to localStorage as cache
    if (merged.adminHash) localStorage.setItem('isra_admin_hash', merged.adminHash);
    if (merged.duration) localStorage.setItem('isra_dur', merged.duration);
    if (merged.aiKey) localStorage.setItem('isra_ai_key', merged.aiKey);
    Object.keys(merged).forEach(k => {
      if (k.startsWith('pw_')) localStorage.setItem(k, merged[k]);
    });
  }
  return ok;
}

function getCategoryPassword(cat) {
  return _settingsCache[`pw_${cat}`] || 'isra123';
}

async function setAdminHash(hash) {
  return saveSettings({ adminHash: hash });
}

async function checkAdminPassword(plain) {
  const enteredHash = await hashStr(plain);
  const storedHash = _settingsCache.adminHash || '';
  return enteredHash === storedHash;
}

// ------------- Questions (per category) -------------
let _questionsCache = {};

async function loadQuestions(cat) {
  const data = await fbGet(`questions/${cat}`);
  if (Array.isArray(data)) {
    _questionsCache[cat] = data;
    return data;
  }
  // fallback to localStorage if Firebase fails
  const local = localStorage.getItem(`q_${cat}`);
  if (local) {
    try {
      const arr = JSON.parse(local);
      _questionsCache[cat] = arr;
      return arr;
    } catch(e) {}
  }
  _questionsCache[cat] = [];
  return [];
}

async function saveQuestions(cat, questions) {
  const ok = await fbSet(`questions/${cat}`, questions);
  if (ok) {
    _questionsCache[cat] = questions;
    localStorage.setItem(`q_${cat}`, JSON.stringify(questions)); // cache
    return true;
  }
  // if Firebase fails, save only locally (offline mode)
  localStorage.setItem(`q_${cat}`, JSON.stringify(questions));
  _questionsCache[cat] = questions;
  toast('Saved locally only – Firebase unreachable', 'er');
  return false;
}

// ------------- History (test results) -------------
let _historyCache = [];

async function loadHistory() {
  const data = await fbGet('history');
  if (Array.isArray(data)) {
    _historyCache = data;
    return data;
  }
  _historyCache = [];
  return [];
}

async function saveHistoryRecord(record) {
  const ok = await fbPush('history', record);
  if (ok) {
    _historyCache.push(record);
  }
  // also optionally send to Google Sheet (if URL configured)
  const gsUrl = localStorage.getItem('isra_gs_url');
  if (gsUrl) {
    try {
      await fetch(gsUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record)
      });
    } catch(e) {}
  }
  return ok;
}

// ------------- Helper: hash password -------------
async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ------------- One‑time default admin password -------------
(async function initDefaultAdmin() {
  const settings = await loadSettings();
  if (!settings.adminHash) {
    const defaultHash = await hashStr('Alibaloch-IU');
    await saveSettings({ adminHash: defaultHash, duration: '60' });
    console.log('Default admin password set: Alibaloch-IU');
  }
})();
